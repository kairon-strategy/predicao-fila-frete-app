# =============================================================================
# Kairon Frete — Deploy (release pipeline)
# -----------------------------------------------------------------------------
# Fires only on push to `main`. Builds the three service images, pushes them to
# Docker Hub (tagged `latest` + the commit SHA) and then pings Render's deploy
# hook so it pulls the fresh images.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME   Docker Hub user/org with push rights to kaironstrategy/*
#   DOCKERHUB_TOKEN      Docker Hub access token (NOT the account password)
#   RENDER_DEPLOY_HOOK   Render "Deploy Hook" URL (fires a redeploy on POST)
#
# Provider/runtime secrets consumed by the running services (set them on Render,
# not here): ANTHROPIC_API_KEY, SENTRY_DSN, SUPABASE_URL, SUPABASE_KEY,
# SUPABASE_JWT_SECRET, BACKBLAZE_KEY_ID, BACKBLAZE_APP_KEY, DATABASE_URL, etc.
# =============================================================================
name: Deploy

on:
  push:
    branches:
      - main

# Never run two releases at once; let the newest win.
concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  DOCKER_ORG: kaironstrategy

jobs:
  deploy:
    name: Build, push & release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Short 12-char SHA used as an immutable image tag alongside `latest`.
      - name: Compute image tag
        id: vars
        run: echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      # --------------------------- API --------------------------- #
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.DOCKER_ORG }}/kairon-api:latest
            ${{ env.DOCKER_ORG }}/kairon-api:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --------------------------- UI ---------------------------- #
      - name: Build & push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ui
          push: true
          tags: |
            ${{ env.DOCKER_ORG }}/kairon-ui:latest
            ${{ env.DOCKER_ORG }}/kairon-ui:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------- Worker -------------------------- #
      - name: Build & push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.DOCKER_ORG }}/kairon-worker:latest
            ${{ env.DOCKER_ORG }}/kairon-worker:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------- Release ------------------------- #
      # Render pulls the freshly-pushed `latest` images on redeploy.
      - name: Trigger Render deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
